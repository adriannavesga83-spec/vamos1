<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTRAX EMPIRE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    overflow:hidden;
    position:relative;
}

/* Fondo neon */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#ff0000;
    filter:blur(180px);
    opacity:.25;
    top:-150px;
    left:-150px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#ff0000;
    filter:blur(180px);
    opacity:.15;
    bottom:-150px;
    right:-150px;
}

.container{
    position:relative;
    z-index:10;
    max-width:900px;
    width:90%;
    text-align:center;
    padding:50px;
    border:1px solid rgba(255,0,0,.25);
    border-radius:25px;
    background:rgba(15,15,15,.85);
    backdrop-filter:blur(15px);
    box-shadow:
        0 0 20px rgba(255,0,0,.2),
        0 0 40px rgba(255,0,0,.15),
        inset 0 0 20px rgba(255,0,0,.08);
    animation:fadeIn 1s ease;
}

.logo{
    width:120px;
    height:120px;
    margin:0 auto 25px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #ff0000;
    box-shadow:
        0 0 15px #ff0000,
        0 0 30px #ff0000;
}

h1{
    color:white;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000;
}

p{
    color:#d8d8d8;
    font-size:1.15rem;
    line-height:1.8;
    margin-bottom:35px;
}

.telegram-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
    padding:18px 40px;
    border-radius:12px;
    color:white;
    font-size:1.1rem;
    font-weight:600;
    background:linear-gradient(90deg,#ff0000,#b30000);
    box-shadow:
        0 0 15px #ff0000,
        0 0 35px rgba(255,0,0,.8);
    transition:.3s;
}

.telegram-btn:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:
        0 0 25px #ff0000,
        0 0 50px #ff0000;
}

.telegram-btn svg{
    width:22px;
    height:22px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .container{
        padding:35px 25px;
    }

    h1{
        font-size:2.2rem;
    }

    p{
        font-size:1rem;
    }

    .logo{
        width:90px;
        height:90px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- CAMBIA logo.png POR TU LOGO -->
    <img src="https://i.ibb.co/B51dNgRG/ANTRAX.png" alt="Logo" class="logo">

    <h1>ANTRAX OFICIAL</h1>

    <p>
        Te pongo a ganar 2 palos diarios con tu NEQUI, para ver toda la informacion 
      unete a mi grupo de TELEGRAM con el boton de ABAJO 👇
    </p>

    <!-- CAMBIA EL LINK POR TU TELEGRAM -->
    <a href="https://t.me/+Ktn3l_8r-rdlMDEx" target="_blank" class="telegram-btn">

        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.5 2.5L2.8 9.7c-1.3.5-1.3 1.3-.2 1.6l4.8 1.5 1.8 5.7c.2.6.1.8.8.8.5 0 .7-.2 1-.5l2.3-2.2 4.8 3.5c.9.5 1.5.2 1.7-.8l3.2-15.1c.3-1.2-.4-1.8-1.5-1.3z"/>
        </svg>

        👉UNETE AL GRUPO AQUI👈

    </a>

</div>

</body>
</html>
