<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTRAX EMPIRE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:#050505;
    overflow-x:hidden;
    position:relative;
}

/* Efectos de fondo */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#ff0000;
    filter:blur(180px);
    opacity:.25;
    top:-150px;
    left:-150px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#ff0000;
    filter:blur(180px);
    opacity:.15;
    bottom:-150px;
    right:-150px;
}

.container{
    position:relative;
    z-index:10;
    width:100%;
    max-width:500px;
    text-align:center;
    padding:35px 25px;
    border-radius:25px;
    background:rgba(15,15,15,.90);
    border:1px solid rgba(255,0,0,.25);
    backdrop-filter:blur(15px);

    box-shadow:
    0 0 20px rgba(255,0,0,.25),
    0 0 40px rgba(255,0,0,.15),
    inset 0 0 20px rgba(255,0,0,.08);

    animation:fadeIn 1s ease;
}

.logo{
    width:170px;
    max-width:100%;
    margin-bottom:20px;
    filter:drop-shadow(0 0 20px #ff0000);
}

h1{
    color:white;
    font-size:2.2rem;
    font-weight:800;
    margin-bottom:15px;

    text-shadow:
    0 0 10px #ff0000,
    0 0 20px #ff0000,
    0 0 40px #ff0000;
}

p{
    color:#e0e0e0;
    font-size:1rem;
    line-height:1.8;
    margin-bottom:30px;
}

.telegram-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:18px;
    border-radius:15px;

    text-decoration:none;
    color:white;
    font-size:1rem;
    font-weight:700;

    background:linear-gradient(90deg,#ff0000,#990000);

    box-shadow:
    0 0 20px #ff0000,
    0 0 40px rgba(255,0,0,.7);

    transition:.3s;
}

.telegram-btn:hover{
    transform:scale(1.03);
}

.telegram-btn svg{
    width:22px;
    height:22px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Ajustes extra para celulares */
@media(max-width:480px){

    .container{
        padding:30px 20px;
    }

    .logo{
        width:140px;
    }

    h1{
        font-size:1.8rem;
    }

    p{
        font-size:.95rem;
    }

    .telegram-btn{
        font-size:.95rem;
        padding:16px;
    }
}

</style>
</head>
<body>

<div class="container">

    <img src="https://i.ibb.co/B51dNgRG/ANTRAX.png" alt="ANTRAX" class="logo">

    <h1>ANTRAX OFICIAL</h1>

    <p>
        Te pongo a ganar 2 palos diarios con tu NEQUI.<br><br>
        Para ver toda la información, únete a mi grupo privado de Telegram presionando el botón de abajo 👇
    </p>

    <a href="https://t.me/+Ktn3l_8r-rdlMDEx" target="_blank" class="telegram-btn">

        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.5 2.5L2.8 9.7c-1.3.5-1.3 1.3-.2 1.6l4.8 1.5 1.8 5.7c.2.6.1.8.8.8.5 0 .7-.2 1-.5l2.3-2.2 4.8 3.5c.9.5 1.5.2 1.7-.8l3.2-15.1c.3-1.2-.4-1.8-1.5-1.3z"/>
        </svg>

        👉 UNETE AL GRUPO AQUI 👈

    </a>

</div>

</body>
</html>
